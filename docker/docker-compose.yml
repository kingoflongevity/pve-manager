# ============================================================
# PVE Manager - Docker Compose 配置
# ============================================================
# 启动:     docker compose up -d
# 查看日志: docker compose logs -f
# 停止:     docker compose down
# 重建:     docker compose up -d --build
# ============================================================

services:
  pve-manager:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    image: pve-manager:latest
    container_name: pve-manager
    restart: unless-stopped

    # 端口映射
    ports:
      - "${APP_PORT:-8080}:8080"

    # 环境变量
    environment:
      - TZ=Asia/Shanghai
      - PVE_DEV_MODE=${PVE_DEV_MODE:-false}

    # 数据持久化
    volumes:
      # SQLite 数据库
      - pve-data:/app/data
      # 配置文件（可选）
      - ./config:/app/config:ro
      # 日志
      - ./logs:/app/logs

    # 资源限制
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 128M

    # 日志配置
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    networks:
      - pve-net

# ============================================================
# 数据卷定义
# ============================================================
volumes:
  pve-data:
    driver: local

# ============================================================
# 网络定义
# ============================================================
networks:
  pve-net:
    driver: bridge
