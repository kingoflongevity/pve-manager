# ============================================================
# PVE Web Management Panel - Nginx 生产环境配置
# ============================================================
# 使用说明:
#   此配置文件用于 Nginx 反向代理模式
#   如果直接使用 Docker 部署，可不使用此配置
#   如需使用，将文件挂载到 /etc/nginx/conf.d/default.conf
# ============================================================

# 上游服务器定义（Go 后端服务）
upstream backend_server {
    server 127.0.0.1:3000;
    keepalive 32;  # 保持空闲连接，减少 TCP 握手开销
}

# HTTP 服务器配置（自动跳转到 HTTPS）
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;  # 修改为实际域名

    # Let's Encrypt 验证路径
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 所有 HTTP 请求重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 服务器配置（生产环境）
server {
    # 监听 IPv4 和 IPv6 的 443 端口，启用 HTTP/2
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com;  # 修改为实际域名

    # ----------------------------------------------------------
    # SSL/TLS 证书配置
    # ----------------------------------------------------------
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # 安全 SSL 协议配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;

    # SSL 会话缓存（提升重复访问性能）
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;  # 禁用 session tickets 增强安全性

    # OCSP Stapling（提升证书验证性能）
    ssl_stapling on;
    ssl_stapling_verify on;

    # ----------------------------------------------------------
    # 安全响应头
    # ----------------------------------------------------------
    # 防止 MIME 类型嗅探
    add_header X-Content-Type-Options "nosniff" always;
    # 防止 Clickjacking 攻击
    add_header X-Frame-Options "SAMEORIGIN" always;
    # 启用 XSS 过滤器
    add_header X-XSS-Protection "1; mode=block" always;
    # 严格传输安全（HSTS，强制 HTTPS）
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # 引用策略
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # 内容安全策略（根据实际需求调整）
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' wss: ws:;" always;
    # 移除服务器版本信息
    more_clear_headers Server;

    # ----------------------------------------------------------
    # Gzip 压缩配置
    # ----------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;  # 压缩级别 1-9，6 是性能和压缩率的平衡点
    gzip_min_length 256;  # 最小压缩文件大小
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/opentype
        application/font-woff
        application/font-woff2;

    # ----------------------------------------------------------
    # 前端静态文件服务
    # ----------------------------------------------------------
    root /usr/share/nginx/html;

    # 默认首页
    index index.html;

    # 前端静态资源（Vue SPA 构建产物）
    location / {
        try_files $uri $uri/ /index.html;

        # 静态资源缓存策略
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ----------------------------------------------------------
    # API 代理（转发到 Go 后端）
    # ----------------------------------------------------------
    location /api/ {
        proxy_pass http://backend_server;
        proxy_http_version 1.1;

        # 转发原始请求头和客户端 IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # 禁用缓冲（提升 API 响应速度）
        proxy_buffering off;
        proxy_request_buffering off;

        # 超时设置
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ----------------------------------------------------------
    # WebSocket 代理（noVNC 远程控制台）
    # ----------------------------------------------------------
    location /ws/ {
        proxy_pass http://backend_server;
        proxy_http_version 1.1;

        # WebSocket 升级必需的头
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 转发客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 超时设置（noVNC 需要较长超时）
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;

        # 禁用缓冲
        proxy_buffering off;
    }

    # ----------------------------------------------------------
    # 健康检查端点（不记录日志）
    # ----------------------------------------------------------
    location /health {
        proxy_pass http://backend_server;
        proxy_http_version 1.1;
        access_log off;
    }

    # ----------------------------------------------------------
    # 错误页面配置
    # ----------------------------------------------------------
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # ----------------------------------------------------------
    # 日志配置
    # ----------------------------------------------------------
    access_log /var/log/nginx/pve-webui-access.log;
    error_log /var/log/nginx/pve-webui-error.log warn;

    # 禁止访问隐藏文件（如 .env、.git）
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
